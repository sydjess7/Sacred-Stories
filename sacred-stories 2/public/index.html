<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- PWA / Mobile -->
    <meta name="theme-color" content="#302b63" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sacred Stories" />

    <!-- SEO -->
    <meta name="description" content="The entire Bible retold in fanfic, fantasy, anime, and modern styles. Track your reading progress and earn badges." />

    <!-- Open Graph (for sharing) -->
    <meta property="og:title" content="Sacred Stories — The Bible Retold" />
    <meta property="og:description" content="Every Bible story retold in styles you'll love. Read in order or browse by book." />
    <meta property="og:type" content="website" />

    <!-- Icons -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />

    <title>Sacred Stories</title>

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #0f0c29;
        color: #f0e6d3;
        font-family: 'Lora', Georgia, serif;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior: none;
      }
      /* Safe area padding for notched phones */
      #root {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
